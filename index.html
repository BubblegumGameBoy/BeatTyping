<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Piano</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- Title Screen -->
  <div id="title-screen" class="screen">
    <div class="title-wrap">
      <h1 class="title">Typing Piano</h1>
      <p class="subtitle">キーを押して名曲を演奏しよう</p>
      <div id="song-list"></div>
    </div>
  </div>

  <!-- Play Screen -->
  <div id="play-screen" class="screen">
    <div class="play-header">
      <div class="song-name" id="song-name-display"></div>
      <div class="bpm-control">
        <button class="bpm-btn" id="bpm-down">−</button>
        <span id="bpm-display">120</span>
        <button class="bpm-btn" id="bpm-up">＋</button>
        <span class="bpm-label">BPM</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">0%</div>
    </div>

    <canvas id="effect-canvas"></canvas>

    <!-- Typing text display -->
    <div id="typing-area">
      <div id="typing-text"></div>
    </div>

    <div class="play-footer">
      <span class="key-hint">任意のキーを押して演奏してください</span>
      <button class="back-btn" id="back-btn">← 曲選択</button>
    </div>
  </div>

  <!-- Complete Screen -->
  <div id="complete-screen" class="screen">
    <div class="complete-content">
      <h2>演奏完了！</h2>
      <p id="complete-song-name"></p>
      <div class="complete-actions">
        <button class="complete-btn" id="replay-btn">もう一度</button>
        <button class="complete-btn" id="select-btn">曲を選ぶ</button>
      </div>
    </div>
  </div>

</div>

<!-- Home Position Overlay (shown before tutorial songs) -->
<div id="homepos-overlay">
  <div class="homepos-panel">
    <div class="homepos-title">ホームポジション</div>
    <div class="homepos-sub">まず両手をキーボードのここに置こう</div>

    <div class="homepos-kb">
      <div class="homepos-keys">
        <div class="hk hp-pinky-l">A<small>小指</small></div>
        <div class="hk hp-ring-l">S<small>薬指</small></div>
        <div class="hk hp-mid-l">D<small>中指</small></div>
        <div class="hk hp-idx-l">F<small>人差し指</small></div>
        <div class="hk hp-dim">G</div>
        <div class="hk hp-dim">H</div>
        <div class="hk hp-idx-r">J<small>人差し指</small></div>
        <div class="hk hp-mid-r">K<small>中指</small></div>
        <div class="hk hp-ring-r">L<small>薬指</small></div>
      </div>
      <div class="homepos-labels">
        <span>← 左手</span>
        <span>右手 →</span>
      </div>
    </div>

    <div class="homepos-tip">タイルが降ってきたら、光ったキーを押そう。<br>押したらすぐホームポジションに指を戻すのがコツ！</div>

    <button id="homepos-start-btn">準備できた！スタート ▶</button>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg">読み込み中…</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script src="js/songs.js"></script>
<script src="js/audio.js"></script>
<script src="js/effects.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
